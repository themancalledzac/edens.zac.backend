spring.profiles.active=${SPRING_PROFILES_ACTIVE:-default}

# Common settings
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.enabled=true

#----------------------------------------#
# PostgreSQL Configuration
# Spring Boot Auto-Configuration handles the DataSource automatically
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-edens_zac}
spring.datasource.username=${POSTGRES_USER:-zedens}
spring.datasource.password=${POSTGRES_PASSWORD:-password}
spring.datasource.driver-class-name=org.postgresql.Driver

#----------------------------------------#
# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
# keepalive replaces silently-dead connections (DB restart / SSH tunnel drop) before a request hits them
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=1800000

# PostgreSQL Specific Optimization
# Enables driver to cache prepared statements (performance boost)
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

#----------------------------------------#
# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Tolerate applied-but-absent migrations so a previous binary can boot after a roll-back
# (expand/contract rollback window; a rolled-back release sees a newer applied migration as missing).
spring.flyway.ignore-migration-patterns=*:missing

#----------------------------------------#
# AWS S3 Configuration
aws.access.key.id=${AWS_ACCESS_KEY_ID}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY}
aws.s3.region=us-west-2
aws.portfolio.s3.bucket=${AWS_PORTFOLIO_S3_BUCKET}
cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN}
cloudfront.distribution-id=${AWS_CLOUDFRONT_DISTRIBUTION_ID:}

#----------------------------------------#
# Internal API Secret (shared with Next.js proxy)
internal.api.secret=${INTERNAL_API_SECRET:dev-internal-secret}
# Optional rotation candidate: when set, requests bearing either current or next secret are accepted.
internal.api.secret.next=${INTERNAL_API_SECRET_NEXT:}

# Access Token Secret (for client gallery HMAC tokens)
app.access-token.secret=${ACCESS_TOKEN_SECRET}

#----------------------------------------#
# Actuator Configuration (restrict exposed endpoints)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

#----------------------------------------#
# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false

#----------------------------------------#
# Spring HTTP codec - cap deserialised request bodies (defence against oversized JSON payloads)
spring.codec.max-in-memory-size=64KB

#----------------------------------------#
# Logging Configuration
logging.level.root=INFO
logging.level.edens.zac.portfolio.backend=DEBUG

#----------------------------------------#
# Contact form rate limits
app.contact.rate-limit-per-hour=500
app.contact.rate-limit-per-email-per-hour=5

#----------------------------------------#
# Client gallery access cookie
# Production must keep cookie-secure=true. The dev profile overrides this to false
# so the gate can be unlocked over plain http://localhost (browsers reject Secure
# cookies on insecure origins). Override via env if running TLS locally.
app.gallery-access.cookie-secure=${GALLERY_COOKIE_SECURE:true}

#----------------------------------------#
# Admin bootstrap (env-driven; designates the SPECIFIC admin on startup).
# The repo is public — carry NO identity here. Both are empty by default and supplied via the
# prod .env (NEVER committed). AdminBootstrap flips users.is_admin on for this email, or seeds a
# new admin when the user is absent and a password is provided.
app.auth.admin.bootstrap-email=${ADMIN_BOOTSTRAP_EMAIL:}
app.auth.admin.bootstrap-password=${ADMIN_BOOTSTRAP_PASSWORD:}

#----------------------------------------#
# Admin API authorization. When true (prod + the default everywhere), /api/admin/** requires
# ROLE_ADMIN (is_admin=true) in addition to the prod-only InternalSecretFilter perimeter.
# application-dev.properties flips this off so local dev stays login-free.
app.admin.enforce-authz=${ADMIN_ENFORCE_AUTHZ:true}

#----------------------------------------#
# Auth session + cookie
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:true}
app.auth.session.ttl-days=60
app.auth.session.refresh-threshold-hours=24
app.auth.session.max-lifetime-days=90
app.auth.login.max-attempts=5
app.auth.login.window-minutes=15
app.auth.webauthn.rp-id=${WEBAUTHN_RP_ID:localhost}
app.auth.webauthn.rp-name=${WEBAUTHN_RP_NAME:Zac Edens Photography}
app.auth.webauthn.allowed-origins=${WEBAUTHN_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
app.auth.webauthn.challenge-ttl-minutes=5

#----------------------------------------#
# Email (AWS SES v2)
# Disabled by default — flip to true once SES domain + from-address verification land.
email.enabled=${EMAIL_ENABLED:false}
email.from-address=${EMAIL_FROM_ADDRESS:no-reply@edens.zac}
email.frontend-base-url=${EMAIL_FRONTEND_BASE_URL:https://zacedens.com}
