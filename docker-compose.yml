services:
  backend:
    image: edens.zac.backend:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Database Config - connects to external PostgreSQL (managed in ~/portfolio-db/)
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-edens_zac}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-zedens}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Spring profile: must be explicitly set to dev, prod, or default (no silent fallback).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:?must be set: dev, prod, or default}

      # AWS Config
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-west-2
      AWS_PORTFOLIO_S3_BUCKET: ${AWS_PORTFOLIO_S3_BUCKET}
      AWS_CLOUDFRONT_DOMAIN: ${AWS_CLOUDFRONT_DOMAIN}
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${AWS_CLOUDFRONT_DISTRIBUTION_ID:-}

      # Shared secret for BFF proxy authentication
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret}
      # Optional rotation candidate: set during quarterly rotation only.
      INTERNAL_API_SECRET_NEXT: ${INTERNAL_API_SECRET_NEXT:-}
      # Access token secret for client gallery HMAC tokens
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev-access-token-secret}

      # Admin bootstrap (env-driven; designates the SPECIFIC admin user on startup). Empty
      # by default -- set both in the prod .env to seed/promote the operator's admin account.
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      # Inner app-layer gate for /api/admin/**: requires ROLE_ADMIN when true (default).
      ADMIN_ENFORCE_AUTHZ: ${ADMIN_ENFORCE_AUTHZ:-true}

      # Email (AWS SES v2) — disabled by default; flip EMAIL_ENABLED=true once SES domain + from-address are verified.
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@edens.zac}
      EMAIL_FRONTEND_BASE_URL: ${EMAIL_FRONTEND_BASE_URL:-http://localhost:3000}

      # JVM memory: local dev uses 1g (48GB machine), EC2 prod uses 384m (1GB instance)
      # EC2 prod override: JAVA_OPTS=-Xmx384m -Xms256m
      JAVA_OPTS: ${JAVA_OPTS:--Xmx1g -Xms512m}
    volumes:
      # Local dev only: mount Photography dir so backend can stream RAW files to S3.
      # On EC2 prod, omit PHOTOGRAPHY_PATH or leave empty (RAW uploads only happen locally).
      - ${PHOTOGRAPHY_PATH:-/dev/null}:${PHOTOGRAPHY_PATH:-/dev/null}:ro
      # Local dev only: mount external drives so RAW files stored on external hard disks
      # (e.g. "/Volumes/My Book/Photography/Raw/...") are visible for background S3 upload.
      # Set PHOTOGRAPHY_EXTERNAL_PATH=/Volumes in .env. On EC2 prod, omit it (defaults to
      # /dev/null, which Compose dedupes with the line above -- a harmless no-op).
      - ${PHOTOGRAPHY_EXTERNAL_PATH:-/dev/null}:${PHOTOGRAPHY_EXTERNAL_PATH:-/dev/null}:ro
    deploy:
      resources:
        limits:
          memory: ${DOCKER_MEMORY_LIMIT:-1536M}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
