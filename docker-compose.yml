services:
  backend:
    image: edens.zac.backend:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Database Config - connects to external PostgreSQL (managed in ~/portfolio-db/)
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-edens_zac}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-zedens}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Spring profile: defaults to dev locally, set to prod on EC2
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}

      # AWS Config
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-west-2
      AWS_PORTFOLIO_S3_BUCKET: ${AWS_PORTFOLIO_S3_BUCKET}
      AWS_CLOUDFRONT_DOMAIN: ${AWS_CLOUDFRONT_DOMAIN}

      # Shared secret for BFF proxy authentication
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret}
      # Access token secret for client gallery HMAC tokens
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev-access-token-secret}

      # JVM memory: local dev uses 1g (48GB machine), EC2 prod uses 384m (1GB instance)
      # EC2 prod override: JAVA_OPTS=-Xmx384m -Xms256m
      JAVA_OPTS: ${JAVA_OPTS:--Xmx1g -Xms512m}
    volumes:
      # Local dev only: mount Photography dir so backend can stream RAW files to S3.
      # On EC2 prod, omit PHOTOGRAPHY_PATH or leave empty (RAW uploads only happen locally).
      - ${PHOTOGRAPHY_PATH:-/dev/null}:${PHOTOGRAPHY_PATH:-/dev/null}:ro
    deploy:
      resources:
        limits:
          memory: ${DOCKER_MEMORY_LIMIT:-1536M}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
